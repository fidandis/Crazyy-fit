<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Crazyy Fit</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'DM Sans', sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(96px, 20vw, 160px);
      line-height: 1;
      color: #ff4500;
      letter-spacing: 4px;
    }
    .label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #888;
      margin: 16px 0 32px;
    }
    .home-btn {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 14px 32px;
      background: #ff4500;
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .home-btn:hover { background: #ff6b35; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <div class="label">Page not found</div>
  <a href="/" class="home-btn">Back to Home</a>
</body>
</html>
