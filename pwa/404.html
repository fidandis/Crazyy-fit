<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Crazyy Fit</title>
  <meta name="theme-color" content="#0a0c0e" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0c0e; --surface: #131619; --line: #262b30;
      --text: #f4f5f6; --text-2: #a1a8b0; --text-3: #5a6168;
      --accent: #3B9EFF; --accent-dim: #1E6FCC;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      background-image:
        radial-gradient(at 80% 0%, rgba(59,158,255,0.07) 0%, transparent 50%),
        radial-gradient(at 0% 100%, rgba(255,77,46,0.03) 0%, transparent 50%);
      color: var(--text);
      font-family: 'Geist', sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .wordmark {
      font-family: 'Geist', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 48px;
    }
    .wordmark .yy { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; color: var(--accent); letter-spacing: -0.03em; }
    .code {
      font-family: 'Geist', sans-serif;
      font-weight: 800;
      font-size: clamp(110px, 26vw, 200px);
      line-height: 0.9;
      letter-spacing: -0.05em;
      color: var(--text);
    }
    .code em {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }
    .label {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-3);
      margin: 18px 0 36px;
    }
    .home-btn {
      font-family: 'Geist', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      padding: 16px 32px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .home-btn .ar { transition: transform 0.2s; }
    .home-btn:hover { box-shadow: 0 0 28px rgba(59,158,255,0.55); transform: translateY(-1px); }
    .home-btn:hover .ar { transform: translateX(3px); }
  </style>
</head>
<body>
  <div class="wordmark">CRAZ<span class="yy">YY</span>FIT</div>
  <div class="code">4<em>0</em>4</div>
  <div class="label">Page not found</div>
  <a href="/" class="home-btn">Back to home <span class="ar">→</span></a>
</body>
</html>
