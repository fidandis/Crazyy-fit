# Prevent clickjacking — blocks your app from being embedded in iframes on other sites
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[build]
  publish = "pwa"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# /api/* → Netlify Functions (cleaner URLs in the app)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Root → landing page
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200

# /login and /app → the PWA
[[redirects]]
  from = "/login"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200

# /pricing → pricing page
[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

# SPA fallback — known app paths get index.html, everything else gets a real 404
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[functions]
  node_bundler = "esbuild"

[functions."weekly-digest"]
  schedule = "0 8 * * 1"
